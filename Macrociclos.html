<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaska.Climb | Macrociclos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg-principal: #121212; --bg-panel: rgba(30, 30, 30, 0.95); --border-general: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-principal); color: #e0e0e0; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { position: relative; width: 100%; max-width: 1000px; background: var(--bg-panel); padding: 30px; border-radius: 20px; border: 1px solid var(--border-general); }
        #header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #pantalla { display: flex; width: 100%; height: 60px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .bloque { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: grab; color: #000; position: relative; }
        /* Nuevos estilos para fechas en pantalla */
        .fecha-inicio-bloque { position: absolute; top: 2px; left: 2px; font-size: 8px; color: rgba(0,0,0,0.7); }
        .fecha-fin-bloque { position: absolute; bottom: 2px; right: 2px; font-size: 8px; color: rgba(0,0,0,0.7); font-weight: bold; }
        .fmax { background-color: #ff6b6b; } .desox { background-color: #4dabf7; }
        .reox { background-color: #69db7c; } .aero { background-color: #b197fc; }
        .tap { background-color: #ffd43b; }
    </style>
</head>
<body>
<div class="container">
    <div id="header-info">
        <h1 id="titulo" contenteditable="true">Macrociclo</h1>
        <div>Inicio: <input type="date" id="fechaInicio" onchange="calcularTotal()"></div>
    </div>
    <div id="pantalla"></div>
    <div style="margin-top: 20px;">TOTAL: <span id="totalSemanas">0</span> SEMANAS</div>
    <button onclick="exportarPDF()">Exportar PDF</button>
</div>

<script>
    function calcularTotal() {
        const pantalla = document.getElementById('pantalla');
        const inicio = document.getElementById('fechaInicio').value;
        if (!inicio) return;
        
        let fechaActual = new Date(inicio);
        const bloques = document.querySelectorAll('.bloque');
        let total = 0;

        bloques.forEach(b => {
            const semanas = parseInt(b.style.flex);
            total += semanas;
            
            // Fecha inicio del bloque
            const fInicio = new Date(fechaActual);
            
            // Calcular fin del bloque
            fechaActual.setDate(fechaActual.getDate() + (semanas * 7));
            const fFin = new Date(fechaActual);

            b.innerHTML = `
                <span class="fecha-inicio-bloque">${fInicio.getDate()}/${fInicio.getMonth()+1}</span>
                <span>${b.dataset.fase.toUpperCase()}</span>
                <span>${semanas}S</span>
                <span class="fecha-fin-bloque">${fFin.getDate()}/${fFin.getMonth()+1}</span>
            `;
        });
        document.getElementById('totalSemanas').innerText = total;
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('landscape');
        const bloques = document.querySelectorAll('.bloque');
        let fechaActual = new Date(document.getElementById('fechaInicio').value);
        let x = 10;

        bloques.forEach(b => {
            const semanas = parseInt(b.style.flex);
            const w = semanas * 20;
            pdf.rect(x, 20, w, 20);
            pdf.text(b.dataset.fase, x + 2, 30);
            
            // Fecha Inicio
            pdf.setFontSize(8);
            pdf.text(`${fechaActual.getDate()}/${fechaActual.getMonth()+1}`, x + 2, 25);
            
            fechaActual.setDate(fechaActual.getDate() + (semanas * 7));
            
            // Fecha Fin
            pdf.text(`${fechaActual.getDate()}/${fechaActual.getMonth()+1}`, x + w - 8, 38);
            x += w;
        });
        pdf.save('Macrociclo.pdf');
    }
    
    // Al añadir bloques, asegúrate de asignar el data-fase
    // Ejemplo: b.dataset.fase = fase;
</script>
</body>
</html>
