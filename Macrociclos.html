<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaska.Climb | Macrociclos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg-principal: #121212; --bg-panel: rgba(30, 30, 30, 0.95); --border-general: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-principal); color: #e0e0e0; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .fondo-logo { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: url('logo.png'); background-repeat: no-repeat; background-position: center; background-size: 100%; opacity: 0.2; z-index: -10; }
        
        .container { position: relative; width: 100%; max-width: 1000px; background: var(--bg-panel); padding: 30px; border-radius: 20px; border: 1px solid var(--border-general); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #titulo { font-size: 18px; font-weight: 700; text-transform: uppercase; margin: 0; color: #fff; outline: none; }
        .fechas { display: flex; gap: 15px; font-size: 14px; }
        .fechas input { background: #2c2c2c; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; }
        .controls { display: flex; gap: 6px; margin-bottom: 20px; }
        button { background: #3a3a3a; color: #fff; border: 1px solid #4a4a4a; padding: 6px 12px; font-size: 11px; cursor: pointer; border-radius: 4px; text-transform: capitalize; }
        select { background: #2c2c2c; color: #ffffff; border: 1px solid #4a4a4a; padding: 6px; font-size: 11px; border-radius: 4px; }
        
        #pantalla-wrapper { position: relative; width: 100%; padding: 3px; }
        #pantalla { display: flex; width: 100%; height: 60px; border: 1px solid rgba(255,255,255,0.01); overflow: hidden; }
        .bloque { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; cursor: grab; color: #000; }
        .btn-borrar { margin-top: 2px; background: rgba(0,0,0,0.15); border: none; font-size: 9px; cursor: pointer; border-radius: 3px; }
        .fmax { background-color: #ff6b6b; } .desox { background-color: #4dabf7; }
        .reox { background-color: #69db7c; } .aero { background-color: #b197fc; }
        .tap { background-color: #ffd43b; }
        .fecha-item { font-size: 9px; color: #aaa; text-align: center; }
    </style>
</head>
<body>
<div class="fondo-logo"></div>
<div class="container">
    <div id="header-info">
        <h1 id="titulo" contenteditable="true" onblur="autoGuardar()">Macrociclo</h1>
        <div class="fechas">
            <div>Inicio: <input type="date" id="fechaInicio" onchange="calcularTotal(); autoGuardar();"></div>
            <div>Fin: <input type="date" id="fechaFin" readonly></div>
        </div>
    </div>
    <div class="controls">
        <select id="fase"><option value="fmax">FMAX</option><option value="desox">DESOX</option><option value="reox">REOX</option><option value="aero">AERO</option><option value="tap">TAP</option></select>
        <select id="duracion"><script>for(let i=1; i<=8; i++) document.write(`<option value="${i}">${i}S</option>`);</script></select>
        <button onclick="agregarBloque()">Añadir</button>
        <button onclick="guardarArchivo()">Guardar</button>
        <button onclick="cargarArchivo()">Cargar</button>
        <button onclick="limpiarPlan()">Limpiar</button>
        <button onclick="exportarPDF()">Exportar PDF</button>
    </div>
    <div id="pantalla-wrapper">
        <div id="pantalla"></div>
        <div id="contenedor-fechas" style="display: flex; width: 100%; margin-top: 5px;"></div>
    </div>
    <div style="margin-top: 15px; font-weight: 700; font-size: 16px;">TOTAL: <span id="totalSemanas">0</span> SEMANAS</div>
    
    <div style="text-align: center; margin-top: 20px;">
        <button onclick="window.location.href='index.html'" style="padding: 8px 16px; font-weight: 900;">&larr; INICIO</button>
    </div>
</div>

<script>
    const PLAN_POR_DEFECTO = {
        "titulo": "MACROCICLO MIKEL GARCÍA",
        "inicio": "2026-06-29",
        "bloques": [
            {"fase": "reox", "semanas": 6}, {"fase": "tap", "semanas": 2}, {"fase": "fmax", "semanas": 4},
            {"fase": "desox", "semanas": 4}, {"fase": "tap", "semanas": 2}, {"fase": "fmax", "semanas": 3}, {"fase": "aero", "semanas": 4}
        ]
    };

    function autoGuardar() {
        const data = {
            titulo: document.getElementById('titulo').innerText,
            inicio: document.getElementById('fechaInicio').value,
            bloques: Array.from(document.querySelectorAll('.bloque')).map(b => ({
                fase: b.className.split(' ')[1],
                semanas: parseInt(b.style.flex)
            }))
        };
        localStorage.setItem('kaskaPlan', JSON.stringify(data));
    }

    function agregarBloque(fase = document.getElementById('fase').value, duracion = parseInt(document.getElementById('duracion').value)) {
        const b = document.createElement('div');
        b.className = 'bloque ' + fase;
        b.style.flex = duracion;
        b.innerHTML = `<span>${fase.toUpperCase()}</span><span>${duracion}S</span><button class="btn-borrar" onclick="this.parentElement.remove(); calcularTotal(); autoGuardar();">X</button>`;
        document.getElementById('pantalla').appendChild(b);
        calcularTotal();
        autoGuardar();
    }
    
    function limpiarPlan() {
        document.getElementById('pantalla').innerHTML = '';
        document.getElementById('contenedor-fechas').innerHTML = '';
        localStorage.setItem('kaskaPlan', 'vacio');
        document.getElementById('totalSemanas').innerText = '0';
        document.getElementById('fechaFin').value = '';
        document.getElementById('titulo').innerText = 'Macrociclo';
        document.getElementById('fechaInicio').value = '';
    }

    window.onload = () => {
        const dataGuardada = localStorage.getItem('kaskaPlan');
        let data = (!dataGuardada || dataGuardada === 'vacio') ? PLAN_POR_DEFECTO : JSON.parse(dataGuardada);
        document.getElementById('titulo').innerText = data.titulo;
        document.getElementById('fechaInicio').value = data.inicio;
        data.bloques.forEach(b => agregarBloque(b.fase, b.semanas));
    };

    function calcularTotal() {
        let t = 0;
        const bloques = document.querySelectorAll('.bloque');
        const cont = document.getElementById('contenedor-fechas');
        cont.innerHTML = ''; 
        const inicio = document.getElementById('fechaInicio').value;
        if (!inicio) return;
        let fecha = new Date(inicio);

        bloques.forEach(b => {
            const dur = parseInt(b.style.flex);
            t += dur;
            const div = document.createElement('div');
            div.style.flex = dur;
            div.className = 'fecha-item';
            div.innerText = `${fecha.getDate().toString().padStart(2,'0')}/${(fecha.getMonth()+1).toString().padStart(2,'0')}`;
            cont.appendChild(div);
            fecha.setDate(fecha.getDate() + (dur * 7));
        });

        const final = document.createElement('div');
        final.className = 'fecha-item';
        final.style.flex = '0';
        final.innerText = `${fecha.getDate().toString().padStart(2,'0')}/${(fecha.getMonth()+1).toString().padStart(2,'0')}`;
        cont.appendChild(final);

        document.getElementById('totalSemanas').innerText = t;
        document.getElementById('fechaFin').value = fecha.toISOString().split('T')[0];
    }

    function guardarArchivo() { 
        const blob = new Blob([localStorage.getItem('kaskaPlan')], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'plan.json'; a.click(); 
    }

    function cargarArchivo() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = event => { localStorage.setItem('kaskaPlan', event.target.result); location.reload(); };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function formatearFecha(iso) {
        if (!iso) return '';
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
    }

    function exportarPDF() {
        calcularTotal();
        const { jsPDF } = window.jspdf;
        const pW = 189; const pH = 44;
        const pdf = new jsPDF('landscape', 'mm', [pH, pW]);
        const titulo = (document.getElementById('titulo').innerText || '').trim().toUpperCase();
        const fechaInicio = formatearFecha(document.getElementById('fechaInicio').value);
        const fechaFin = formatearFecha(document.getElementById('fechaFin').value);
        const total = document.getElementById('totalSemanas').innerText.trim();
        const bloques = Array.from(document.querySelectorAll('.bloque')).map(b => ({
            fase: b.className.split(' ')[1],
            semanas: parseInt(b.style.flex)
        }));

        pdf.setFillColor(18, 18, 18);
        pdf.rect(0, 0, pW, pH, 'F');
        pdf.setFillColor(31, 31, 31);
        pdf.setDrawColor(55, 55, 55);
        pdf.roundedRect(4, 4, pW - 8, pH - 8, 3, 3, 'FD');
        pdf.setTextColor(255, 255, 255);
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(9);
        pdf.text(titulo, 8, 10);
        pdf.setFontSize(7.5);
        const dS = `Inicio: ${fechaInicio}     Fin: ${fechaFin}`;
        pdf.text(dS, pW - pdf.getTextWidth(dS) - 8, 10);

        const tS = bloques.reduce((acc, b) => acc + b.semanas, 0) || 1;
        let cX = 8;
        const bW = pW - 16;
        const colores = { fmax:[255,107,107], desox:[77,171,247], reox:[105,219,124], aero:[177,151,252], tap:[255,212,59] };

        bloques.forEach(b => {
            const w = (bW * b.semanas) / tS;
            pdf.setFillColor(...(colores[b.fase] || [255,212,59]));
            pdf.rect(cX, 16, w, 12, 'F');
            pdf.setTextColor(0,0,0);
            pdf.setFontSize(6);
            pdf.text(b.fase.toUpperCase(), cX + w/2, 21, {align:'center'});
            pdf.text(b.semanas + 'S', cX + w/2, 25, {align:'center'});
            cX += w;
        });

        pdf.setTextColor(255,255,255);
        pdf.setFontSize(7);
        pdf.text(`TOTAL: ${total} SEMANAS`, 8, 38);
        pdf.save('Macrociclo.pdf');
    }

    new Sortable(document.getElementById('pantalla'), { animation: 200, onSort: () => { calcularTotal(); autoGuardar(); } });
</script>
</body>
</html>
