<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kaska.Climb">
    <link rel="apple-touch-icon" href="/logo-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaska.Climb | Inicio</title>
    <style>
        :root {
            --bg-principal: #121212;
            /* Panel casi sólido (0.95) */
            --bg-panel: rgba(30, 30, 30, 0.95);
            --border-general: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-principal);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Logo ajustado al 100% (5% más grande que el anterior 95%) */
        .fondo-logo {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100%; 
            opacity: 0.2;
            z-index: -10;
        }

        .contenedor-menu { 
            position: relative;
            z-index: 10;
            text-align: center;
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-general);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 350px;
        }

        h1 { margin: 0 0 40px 0; padding-bottom: 20px; border-bottom: 1px solid var(--border-general); color: #fff; }

        .marca-principal { 
            display: block;
            font-size: 2.2rem; 
            font-weight: 800;
            margin-bottom: 15px; 
        }

        .subtitulo {
            display: block;
            font-size: 1.4rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ccc;
        }

        .botones-menu { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-menu {
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05); 
            color: #fff;
            border: 1px solid var(--border-general);
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        /* HOVER: Más resaltado con fondo claro y sombra */
        .btn-menu:hover { 
            background: rgba(255, 255, 255, 0.2); 
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="fondo-logo"></div>

    <div class="contenedor-menu">
        <h1>
            <span class="marca-principal">Kaska.Climb</span>
            <span class="subtitulo">PLANIFICADOR</span>
        </h1>
        <div class="botones-menu">
            <a href="Sesiones.html" class="btn-menu">Sesiones</a>
            <a href="Semanas.html" class="btn-menu">Semanas</a>
            <a href="Macrociclos.html" class="btn-menu">Macrociclos</a>
        </div>
    </div>

</body>
</html>
