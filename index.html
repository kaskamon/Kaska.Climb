<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333333">
    <meta charset="UTF-8">
    <title>Kaska.Climb | Inicio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .marca-agua-fondo {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('logo.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            opacity: 0.15;
            z-index: -1;
        }
        .contenedor-menu { text-align: center; z-index: 1; }
        h1 { margin-bottom: 40px; color: #0f172a; letter-spacing: -1px; }
        .botones-menu { display: flex; flex-direction: column; gap: 15px; }
        .btn-menu {
            padding: 20px 40px;
            font-size: 18px;
            font-weight: 700;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-menu:hover { background: #334155; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="marca-agua-fondo"></div>
    <div class="contenedor-menu">
        <h1>PLANIFICADOR KASKA.CLIMB</h1>
        <div class="botones-menu">
            <a href="Sesiones.html" class="btn-menu">Sesiones</a>
            <a href="Semanas.html" class="btn-menu">Semanas</a>
            <a href="Macrociclos.html" class="btn-menu">Macrociclos</a>
        </div>
    </div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(registration => {
          console.log('Service Worker registrado con éxito:', registration.scope);
        })
        .catch(error => {
          console.log('Fallo en el registro del Service Worker:', error);
        });
    });
  }
</script>
</body>
</html>
