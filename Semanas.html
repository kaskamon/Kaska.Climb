<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Kaska.Climb | Semanas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg-principal: #121212; --bg-panel: rgba(30, 30, 30, 0.85);
            --input-bg: #2c2c2c; --btn-bg: #3a3a3a; --border-general: #4a4a4a;
        }
        body { font-family: sans-serif; background-color: var(--bg-principal); color: white; padding: 20px; display: flex; justify-content: center; }
        
        .layout-editor { display: flex; gap: 20px; }
        .contenedor-principal { width: 400px; background: var(--bg-panel); padding: 20px; border-radius: 10px; border: 1px solid var(--border-general); }
        
        /* Contenedor lateral derecho con ancho fijo para alinear todo */
        .columna-derecha { width: 250px; display: flex; flex-direction: column; gap: 15px; }

        /* Estilo botones */
        .btn-action { 
            background: var(--input-bg); 
            border: 1px solid var(--border-general); 
            color: #fff; 
            padding: 10px 0; 
            border-radius: 4px; 
            font-size: 0.75em; 
            cursor: pointer; 
            width: 100%; /* FUERZA ANCHO TOTAL */
            display: block;
            box-sizing: border-box;
        }
        
        #banco { width: 250px; padding: 15px; border: 1px dashed var(--border-general); background: var(--bg-panel); border-radius: 10px; display:flex; flex-direction:column; gap:8px; box-sizing: border-box; }
        
        /* Grid de botones 2x2 ajustado */
        .grid-botones-abajo { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            width: 250px; /* Ancho fijo igual al banco */
            box-sizing: border-box;
        }

        /* --- Estilos base previos mantenidos --- */
        .header { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: var(--bg-panel); padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid var(--border-general); }
        .head-val { background: var(--input-bg); border: 1px solid #444; border-radius: 4px; color: #69db7c; padding: 2px 6px; cursor: pointer; }
        .semana-grid { display: grid; gap: 8px; background: var(--bg-panel); padding: 12px; border-radius: 10px; border: 1px solid var(--border-general); }
        .dia-columna { background: var(--input-bg); border-radius: 6px; padding: 8px; border: 1px solid var(--border-general); display: flex; align-items: center; gap: 8px; min-height: 40px; }
        .sesion { background: #475569; padding: 5px 8px; border-radius: 4px; cursor: move; border: 1px solid var(--border-general); flex-grow: 1; display: flex; align-items: center; min-height: 35px; text-transform: uppercase; color: #000; font-weight: bold; }
        .sesion-contenido { display: grid; grid-template-columns: 20px 1fr 40px; align-items: center; width: 100%; gap: 5px; }
    </style>
</head>
<body>

<div class="layout-editor">
    <div class="contenedor-principal">
        <div class="header">
            <div class="head-item">Semana: <span class="head-val" contenteditable="true" id="h1">01</span></div>
            <div class="head-item">Fecha: <span class="head-val" id="displayDate" onclick="document.getElementById('hiddenDate').showPicker()">DD/MM/AAAA</span><input type="date" id="hiddenDate" style="display:none" onchange="actualizarFecha(this.value)"></div>
            <div class="head-item">Mesociclo: <span class="head-val" contenteditable="true" id="h3">REOX</span></div>
            <div class="head-item">Sem. Micr.: <span class="head-val" contenteditable="true" id="h4">1/4</span></div>
        </div>
        <div class="semana-grid" id="grid">
            <div class="dia-columna" id="d1"><div class="dia-nombre">LUN</div></div>
            <div class="dia-columna" id="d2"><div class="dia-nombre">MAR</div></div>
            <div class="dia-columna" id="d3"><div class="dia-nombre">MIÉ</div></div>
            <div class="dia-columna" id="d4"><div class="dia-nombre">JUE</div></div>
            <div class="dia-columna" id="d5"><div class="dia-nombre">VIE</div></div>
            <div class="dia-columna" id="d6"><div class="dia-nombre">SÁB</div></div>
            <div class="dia-columna" id="d7"><div class="dia-nombre">DOM</div></div>
        </div>
    </div>

    <div class="columna-derecha">
        <button class="btn-action" onclick="window.location.href='index.html'" style="font-weight: 900;">INICIO</button>
        
        <div id="banco">
            <h4>Banco de sesiones</h4>
            </div>

        <div class="grid-botones-abajo">
            <button class="btn-action" onclick="guardar()">Guardar</button>
            <button class="btn-action" onclick="limpiarTabla()">Limpiar</button>
            <button class="btn-action" onclick="restablecerLinks()">Links</button>
            <button class="btn-action" onclick="window.print()">PDF</button>
        </div>
    </div>
</div>

<script>
    // ... tus funciones JS se mantienen igual ...
</script>
</body>
</html>
