<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaska.Climb | Sesiones</title>
    <style>
        /* Tu CSS actual aquí... */
        @media print {
            .cuerpo-app { padding: 0 !important; padding-top: 2mm !important; }
            body { background: #ffffff !important; padding: 0; -webkit-print-color-adjust: exact !important; }
            .zona-botones, .btn-añadir-ejercicio, .btn-eliminar-parte, .zona-ordenar, th:last-child, td:last-child { display: none !important; }
            .bloque-parte { page-break-inside: avoid !important; break-inside: avoid !important; }
        }
    </style>
</head>
<body>

    <div id="vistaPrincipalApp" class="cuerpo-app">
        <div id="img-logo-fondo" class="marca-agua-fondo"></div>
        <div class="contenedor-entreno">
            <div class="cabecera-principal-empresa">
                <div class="contenedor-titulo-principal">
                    <input type="text" id="titulo-entreno-principal" class="input-titulo-gran-formato" placeholder="Pon aquí el título de tu tabla...">
                </div>
            </div>
            
            <div class="zona-botones">
                <button id="btn-nueva-parte" class="btn-principal">Añadir Nueva Parte</button>
                <button id="btn-exportar" class="btn-principal">Guardar como PDF</button>
                </div>
            <div id="contenedor-partes"></div>
        </div>
    </div>

    <script>
        // ... (Tus variables existentes) ...
        const btnExportar = document.getElementById('btn-exportar');

        // FUNCIÓN MEJORADA PARA EL PDF
        btnExportar.addEventListener('click', () => {
            const titulo = document.getElementById('titulo-entreno-principal').value || 'entrenamiento';
            // Cambiamos el título de la página temporalmente para que el sistema lo use como nombre de archivo
            const tituloOriginal = document.title;
            document.title = titulo;
            
            window.print();
            
            // Restauramos el título original después de un breve momento
            setTimeout(() => { document.title = tituloOriginal; }, 1000);
        });

        // ... (EL RESTO DE TU CÓDIGO JS SE MANTIENE EXACTAMENTE IGUAL) ...
    </script>
</body>
</html>
