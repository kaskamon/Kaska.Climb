<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaska.Climb | Sesiones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #0f172a; padding: 30px; background-color: #ffffff; }
        .contenedor-entreno { max-width: 800px; margin: auto; }
        .cabecera-principal-empresa { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #0f172a; }
        .input-titulo-gran-formato { width: 100%; font-size: 28px; font-weight: 800; border: none; background: transparent; outline: none; }
        .btn-principal { color: #ffffff; background-color: #0f172a; padding: 8px 12px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; font-size: 12px; margin-right: 5px; margin-bottom: 5px;}
        .bloque-parte { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; border-left: 5px solid #0f172a; }
        .cabecera-parte { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .celda-editable { outline: none; padding: 5px; border-bottom: 1px dashed #cbd5e0; min-height: 20px; }
        .btn-orden { background: #e2e8f0; border: none; padding: 2px 8px; cursor: pointer; border-radius: 4px; font-size: 10px; }
        .btn-accion { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; }
        .btn-eliminar { background: #fee2e2; color: #dc2626; }
        .btn-añadir-ejercicio { background: #dcfce7; color: #166534; margin-top: 10px; }
        .tabla-ejercicios { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #0f172a; padding: 5px; }
        td { padding: 5px; }
    </style>
</head>
<body>

<div class="contenedor-entreno">
    <div class="cabecera-principal-empresa">
        <input type="text" id="titulo-entreno-principal" class="input-titulo-gran-formato" placeholder="Título de la sesión...">
    </div>
    
    <div class="zona-botones">
        <button id="btn-nueva-parte" class="btn-principal">＋ Añadir Parte</button>
        <button id="btn-guardar-local" class="btn-principal" style="background:#059669;">Guardar Cambios</button>
    </div>

    <div id="contenedor-partes"></div>
</div>

<script>
    const contenedorPartes = document.getElementById('contenedor-partes');
    const inputTitulo = document.getElementById('titulo-entreno-principal');

    // Cargar al iniciar
    window.onload = () => {
        const guardado = localStorage.getItem('kaska_data');
        if (guardado) {
            const data = JSON.parse(guardado);
            inputTitulo.value = data.titulo;
            data.partes.forEach(p => crearParteUI(p.titulo, p.descripcion, p.ejercicios));
        }
    };

    function crearParteUI(t = '', d = '', ejercicios = []) {
        const div = document.createElement('div');
        div.className = 'bloque-parte';
        div.innerHTML = `
            <div class="cabecera-parte">
                <button class="btn-orden" onclick="mover(this.closest('.bloque-parte'), -1)">▲</button>
                <button class="btn-orden" onclick="mover(this.closest('.bloque-parte'), 1)">▼</button>
                <div class="celda-editable" contenteditable="true" style="flex:1; font-weight:bold" placeholder="Título Parte">${t}</div>
                <div class="celda-editable" contenteditable="true" style="flex:2" placeholder="Descripción">${d}</div>
                <button class="btn-accion btn-eliminar" onclick="this.closest('.bloque-parte').remove()">Eliminar</button>
            </div>
            <table class="tabla-ejercicios">
                <thead><tr><th>Ejercicio</th><th>Series</th><th>Notas</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
            <button class="btn-accion btn-añadir-ejercicio" onclick="añadirFila(this.previousElementSibling.querySelector('tbody'))">＋ Ejercicio</button>
        `;
        contenedorPartes.appendChild(div);
        const tbody = div.querySelector('tbody');
        ejercicios.forEach(ej => añadirFila(tbody, ej));
        if (ejercicios.length === 0) añadirFila(tbody);
    }

    function añadirFila(tbody, ej = {n:'', s:'', nt:''}) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><div class="celda-editable" contenteditable="true">${ej.n}</div></td>
            <td><div class="celda-editable" contenteditable="true">${ej.s}</div></td>
            <td><div class="celda-editable" contenteditable="true">${ej.nt}</div></td>
            <td>
                <button class="btn-orden" onclick="mover(this.closest('tr'), -1)">▲</button>
                <button class="btn-orden" onclick="mover(this.closest('tr'), 1)">▼</button>
                <button class="btn-accion btn-eliminar" onclick="this.closest('tr').remove()">✖</button>
            </td>
        `;
        tbody.appendChild(tr);
    }

    function mover(el, dir) {
        if (dir === -1 && el.previousElementSibling) el.parentNode.insertBefore(el, el.previousElementSibling);
        else if (dir === 1 && el.nextElementSibling) el.parentNode.insertBefore(el.nextElementSibling, el);
    }

    document.getElementById('btn-nueva-parte').onclick = () => crearParteUI();

    document.getElementById('btn-guardar-local').onclick = () => {
        const data = {
            titulo: inputTitulo.value,
            partes: Array.from(document.querySelectorAll('.bloque-parte')).map(p => ({
                titulo: p.children[0].children[2].innerText,
                descripcion: p.children[0].children[3].innerText,
                ejercicios: Array.from(p.querySelectorAll('tbody tr')).map(tr => ({
                    n: tr.cells[0].innerText, s: tr.cells[1].innerText, nt: tr.cells[2].innerText
                }))
            }))
        };
        localStorage.setItem('kaska_data', JSON.stringify(data));
        alert('Sesión guardada correctamente.');
    };
</script>

</body>
</html>
