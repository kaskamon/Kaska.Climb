<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kaska.Climb">
    <link rel="apple-touch-icon" href="/logo-192.png">
    <meta name="theme-color" content="#121212">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaska.Climb | Sesiones</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #0f172a; padding: 30px; -webkit-font-smoothing: antialiased; background-color: #ffffff; position: relative; }
        .cuerpo-app { position: relative; min-height: 99vh; }
        .marca-agua-fondo { position: fixed; top: 0; left: 0; width: 100vw; height: 99vh; background-position: center; background-repeat: no-repeat; background-size: cover; transform: scale(0.88); opacity: 0.35; z-index: 0; pointer-events: none; }
        .contenedor-entreno { position: relative; z-index: 1; }
        .cabecera-principal-empresa { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #0f172a; }
        .input-titulo-gran-formato { width: 100%; font-size: 28px; font-weight: 800; border: none; background: transparent; color: #0f172a; outline: none; }
        .zona-botones { margin-bottom: 25px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-principal { color: #ffffff; background-color: #0f172a; padding: 6px 12px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; font-size: 11px; transition: all 0.15s ease-in-out; }
        .btn-principal:hover { background-color: #334155; }
        .bloque-parte { background: rgba(248, 250, 252, 0.85); border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px 4px 16px; margin-bottom: 12px; border-left: 5px solid #0f172a; }
        .cabecera-parte { display: flex; gap: 15px; margin-bottom: 8px; align-items: center; background-color: rgba(237, 242, 247, 0.85); padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e0; }
        .celda-cabecera-editable { outline: none; font-size: 13px; }
        .input-titulo { font-size: 14px; font-weight: 800; flex: 2; }
        .input-descripcion { flex: 4; color: #475569; font-size: 12px; font-style: italic; border-left: 1px solid #cbd5e0; padding-left: 12px; }
        .tabla-ejercicios { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .tabla-ejercicios th { color: #0f172a; padding: 4px; text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #0f172a; }
        .celda-editable { outline: none; font-size: 12px; min-height: 18px; }
        .btn-accion { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 10px; }
        .btn-eliminar { background: transparent; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="vistaPrincipalApp" class="cuerpo-app">
        <div id="img-logo-fondo" class="marca-agua-fondo"></div>
        <div class="contenedor-entreno" id="contenido-a-pdf">
            <div class="cabecera-principal-empresa">
                <input type="text" id="titulo-entreno-principal" class="input-titulo-gran-formato" placeholder="Título de la sesión...">
            </div>
            <div class="zona-botones">
                <button id="btn-nueva-parte" class="btn-principal">Añadir Nueva Parte</button>
                <button id="btn-exportar-pdf" class="btn-principal" style="background-color: #b91c1c;">Guardar como PDF</button>
                <button id="btn-descargar-json" class="btn-principal">Guardar Tabla</button>
                <button id="btn-cargar-visual" class="btn-principal" onclick="document.getElementById('input-cargar-json').click()">Abrir Tabla</button>
                <input type="file" id="input-cargar-json" accept=".json" style="display: none;">
            </div>
            <div id="contenedor-partes"></div>
        </div>
    </div>

    <script>
        const btnNuevaParte = document.getElementById('btn-nueva-parte');
        const contenedorPartes = document.getElementById('contenedor-partes');
        const inputTituloPrincipal = document.getElementById('titulo-entreno-principal');

        // LÓGICA DE EXPORTACIÓN PDF (Forzamos la descarga)
        document.getElementById('btn-exportar-pdf').addEventListener('click', () => {
            const elemento = document.getElementById('contenido-a-pdf');
            const titulo = inputTituloPrincipal.value.trim() || 'sesion_entrenamiento';
            const opciones = {
                margin: 10,
                filename: `${titulo}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opciones).from(elemento).save();
        });

        // FUNCIONES DE TU LÓGICA ORIGINAL
        function crearParteUI(tituloVal = '', descripcionVal = '', ejerciciosLista = []) {
            const bloqueParte = document.createElement('div');
            bloqueParte.className = 'bloque-parte';
            bloqueParte.innerHTML = `
                <div class="cabecera-parte">
                    <div class="input-titulo celda-cabecera-editable" contenteditable="true">${tituloVal || 'Nuevo Bloque'}</div>
                    <div class="input-descripcion celda-cabecera-editable" contenteditable="true">${descripcionVal || 'Descripción...'}</div>
                    <button class="btn-accion btn-eliminar">Eliminar</button>
                </div>
                <table class="tabla-ejercicios">
                    <thead><tr><th>Ejercicio</th><th>Series</th><th>Notas</th><th>Acción</th></tr></thead>
                    <tbody class="cuerpo-tabla-ejercicios"></tbody>
                </table>
                <button class="btn-accion">＋ Añadir Ejercicio</button>
            `;
            contenedorPartes.appendChild(bloqueParte);
            bloqueParte.querySelector('.btn-eliminar').onclick = () => bloqueParte.remove();
            bloqueParte.querySelector('.btn-accion').onclick = () => {
                const fila = document.createElement('tr');
                fila.innerHTML = `<td><div class="celda-editable" contenteditable="true"></div></td><td><div class="celda-editable" contenteditable="true"></div></td><td><div class="celda-editable" contenteditable="true"></div></td><td><button class="btn-accion btn-eliminar">✖</button></td>`;
                bloqueParte.querySelector('tbody').appendChild(fila);
                fila.querySelector('.btn-eliminar').onclick = () => fila.remove();
            };
        }

        btnNuevaParte.addEventListener('click', () => crearParteUI());
        window.addEventListener('DOMContentLoaded', () => crearParteUI());
        
        // (Nota: Puedes pegar aquí el resto de tus funciones de JSON como las tenías originalmente)
    </script>
</body>
</html>
