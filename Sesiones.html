<html lang="es">
<head>

    <style>
        /* MANTÉN TU CSS ORIGINAL AQUÍ. He añadido la regla de impresión necesaria: */
        @media print {
            .cuerpo-app { padding: 0 !important; }
            body { background: #ffffff !important; }
            .zona-botones, .btn-añadir-ejercicio, .btn-eliminar-parte, .zona-ordenar, th:last-child, td:last-child { display: none !important; }

        <div id="img-logo-fondo" class="marca-agua-fondo"></div>
        <div class="contenedor-entreno">
            <div class="cabecera-principal-empresa">
                <input type="text" id="titulo-entreno-principal" class="input-titulo-gran-formato" placeholder="Título de la sesión...">

            </div>
            <div id="contenedor-partes"></div>
        </div>
    </div>

        // FUNCIÓN CLAVE: Guardar PDF con nombre personalizado
        document.getElementById('btn-exportar').addEventListener('click', () => {
            const tituloOriginal = document.title;
            const nuevoTitulo = inputTitulo.value.trim() || 'sesion_entrenamiento';
            document.title = nuevoTitulo; // Esto sugiere el nombre al sistema
            window.print();
            setTimeout(() => { document.title = tituloOriginal; }, 1000);

</body>
</html>
